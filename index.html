<script>
function updateMap() {
  if (!poiData) return;

  poiLayer.clearLayers();

  var geojsonLayer = L.geoJSON(poiData, {
    pointToLayer: function (feature, latlng) {
      return L.circleMarker(latlng, {
        radius: 7,
        fillColor: "blue",
        color: "#333",
        weight: 1,
        fillOpacity: 0.9
      });
    },

    onEachFeature: function (feature, layer) {
      layer.bindPopup("<pre>" + JSON.stringify(feature.properties, null, 2) + "</pre>");
    }
  });

  geojsonLayer.addTo(poiLayer);

  if (poiLayer.getLayers().length > 0) {
    map.fitBounds(poiLayer.getBounds());
  } else {
    console.log("Tidak ada layer yang tampil.");
  }

  console.log("Jumlah layer tampil:", poiLayer.getLayers().length);
  console.log("Isi data GeoJSON:", poiData);
}
</script>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Peta SBSK Bontang 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.96);
      --panel-border: #e5e7eb;
      --text-main: #111827;
      --text-sub: #6b7280;
      --text-soft: #4b5563;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
      --radius: 14px;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text-main);
      background: #f8fafc;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    /* PANEL KIRI */
    .panel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 1000;
      width: 320px;
      max-width: calc(100vw - 28px);
      max-height: calc(100vh - 28px);
      overflow-y: auto;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(6px);
    }

    .panel-header {
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.25;
    }

    .panel-subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.4;
    }

    .section {
      margin-top: 14px;
    }

    .section-title {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
      font-size: 14px;
      color: var(--text-main);
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.05s ease, background 0.2s ease, opacity 0.2s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #e5e7eb;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .stats-card {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .stats-main {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .legend-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-soft);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-main);
    }

    .legend-color {
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.25);
      flex-shrink: 0;
    }

    .legend-note {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-sub);
      line-height: 1.4;
    }

    /* POPUP CUSTOM */
    .asset-popup {
      min-width: 250px;
      max-width: 280px;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .asset-popup-header {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e7eb;
    }

    .asset-popup-title {
      font-size: 14px;
      font-weight: 700;
      color: #111827;
      line-height: 1.35;
      margin-bottom: 2px;
    }

    .asset-popup-subtitle {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.35;
    }

    .asset-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      row-gap: 6px;
      column-gap: 8px;
      font-size: 12px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .asset-label {
      color: #6b7280;
      font-weight: 600;
    }

    .asset-value {
      color: #111827;
      font-weight: 500;
      word-break: break-word;
    }

    .asset-highlight {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .asset-chip {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 8px;
    }

    .asset-chip-label {
      font-size: 11px;
      color: #6b7280;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }

    .asset-chip-value {
      margin-top: 4px;
      font-size: 13px;
      color: #111827;
      font-weight: 700;
    }

    .popup-img {
      margin-top: 10px;
      width: 100%;
      max-width: 100%;
      border-radius: 10px;
      display: block;
      border: 1px solid #e5e7eb;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .panel {
        width: calc(100vw - 20px);
        top: 10px;
        left: 10px;
        max-height: 48vh;
      }

      .asset-popup {
        min-width: 220px;
        max-width: 250px;
      }

      .asset-grid {
        grid-template-columns: 95px 1fr;
      }
    }

    /* Sedikit rapikan kontrol layer bawaan Leaflet */
    .leaflet-control-layers {
      border-radius: 12px !important;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12) !important;
      border: 1px solid #e5e7eb !important;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- PANEL KONTROL -->
  <div class="panel">
    <div class="panel-header">
      <h1 class="panel-title">Peta SBSK Bontang 2026</h1>
      <div class="panel-subtitle">
        Visualisasi aset BMN berdasarkan jarak ke CBD, K/L, dan nilai SBSK.
      </div>
    </div>

    <div class="section">
      <div class="section-title">Filter Data</div>

      <label for="kl">Kementerian / Lembaga</label>
      <select id="kl">
        <option value="all">Semua K/L</option>
      </select>

      <div style="height: 10px;"></div>

      <label for="jarakcbd_km">Jarak ke CBD</label>
      <select id="jarakcbd_km">
        <option value="all">Semua Jarak</option>
        <option value="10">≤ 10 km</option>
        <option value="30">≤ 30 km</option>
      </select>

      <div class="button-row">
        <button class="btn-primary" id="btn-reset">Reset Filter</button>
        <button class="btn-secondary" id="btn-zoom">Zoom Semua Aset</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Statistik</div>

      <div class="stats-card">
        <div id="statistik" class="stats-main"><b>Total Aset:</b> 0</div>

        <div class="legend-title">Kategori Jarak</div>
        <div id="legend-items"></div>

        <div class="legend-note">
          Warna titik menunjukkan kategori jarak aset terhadap CBD.
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Basemap</div>
      <div style="font-size: 12px; color: #6b7280; line-height: 1.5;">
        Gunakan tombol layer di pojok kanan atas peta untuk mengganti basemap.
      </div>
    </div>
  </div>

  <!-- PETA -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // =========================
    // 1. INISIALISASI PETA
    // =========================
    var map = L.map('map', {
      zoomControl: true
    }).setView([0.13, 117.5], 8);

    // =========================
    // 2. BASEMAPS
    // =========================
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    });

    var cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    });

    var esriSatellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        attribution: 'Tiles &copy; Esri'
      }
    );

    // Basemap default
    osm.addTo(map);

    var baseMaps = {
      "OpenStreetMap": osm,
      "Carto Light": cartoLight,
      "Esri Satellite": esriSatellite
    };

    L.control.layers(baseMaps, null, {
      position: 'topright',
      collapsed: false
    }).addTo(map);

    // =========================
    // 3. VARIABEL GLOBAL
    // =========================
    var poiLayer = L.featureGroup().addTo(map);
    var poiData = null;
    var firstLoad = true;
    var allBounds = null;

    // =========================
    // 4. LOAD GEOJSON
    // =========================
    fetch('bmn_poi_web.geojson')
      .then(response => {
        if (!response.ok) {
          throw new Error('Gagal memuat file GeoJSON: ' + response.status);
        }
        return response.json();
      })
      .then(data => {
        poiData = data;
        isiDropdownKL();
        updateMap();
      })
      .catch(error => {
        console.error("Gagal memuat GeoJSON:", error);
        alert("GeoJSON gagal dimuat. Cek nama file, lokasi file, atau format GeoJSON.");
      });

    // =========================
    // 5. ISI DROPDOWN KL
    // =========================
    function isiDropdownKL() {
      if (!poiData || !poiData.features) return;

      var selectKL = document.getElementById("kl");
      var daftarKL = [];

      poiData.features.forEach(function(feature) {
        var kl = feature.properties?.kl;
        if (kl && !daftarKL.includes(kl)) {
          daftarKL.push(kl);
        }
      });

      daftarKL.sort((a, b) => a.localeCompare(b, 'id'));

      daftarKL.forEach(function(kl) {
        var option = document.createElement("option");
        option.value = kl;
        option.textContent = kl;
        selectKL.appendChild(option);
      });
    }

    // =========================
    // 6. FORMAT NILAI UNTUK POPUP
    // =========================
    function tampilkanNilai(value, fallback = '-') {
      if (value === null || value === undefined || value === '') return fallback;
      return value;
    }

    // =========================
    // 7. POPUP HTML ELEGAN
    // =========================
    function buatPopupHTML(p) {
      return `
        <div class="asset-popup">
          <div class="asset-popup-header">
            <div class="asset-popup-title">${tampilkanNilai(p.kl)}</div>
            <div class="asset-popup-subtitle">${tampilkanNilai(p.satker)}</div>
          </div>

          <div class="asset-grid">
            <div class="asset-label">Kode Barang</div>
            <div class="asset-value">${tampilkanNilai(p.kode_barang)}</div>

            <div class="asset-label">NUP</div>
            <div class="asset-value">${tampilkanNilai(p.nup)}</div>

            <div class="asset-label">Jenis Barang</div>
            <div class="asset-value">${tampilkanNilai(p.jenis_barang)}</div>
          </div>

          <div class="asset-highlight">
            <div class="asset-chip">
              <div class="asset-chip-label">Luas</div>
              <div class="asset-chip-value">${tampilkanNilai(p.luas)} m²</div>
            </div>

            <div class="asset-chip">
              <div class="asset-chip-label">Nilai SBSK</div>
              <div class="asset-chip-value">${tampilkanNilai(p.sbsk)}</div>
            </div>
          </div>

          <div class="asset-grid" style="margin-top: 10px;">
            <div class="asset-label">Jarak ke CBD</div>
            <div class="asset-value"><b>${tampilkanNilai(p.jarak_cbd)} km</b></div>
          </div>

          ${p.foto ? `<img src="${p.foto}" class="popup-img" alt="Foto Aset">` : ''}
        </div>
      `;
    }

    // =========================
    // 8. UPDATE PETA SESUAI FILTER
    // =========================
    function updateMap() {
      if (!poiData) return;

      poiLayer.clearLayers();

      var kl = document.getElementById("kl").value;
      var jarak_cbd = document.getElementById("jarakcbd_km").value;

      var total = 0;
      var count10 = 0;
      var count30 = 0;
      var countAbove = 0;

      var geojsonLayer = L.geoJSON(poiData, {
        pointToLayer: function (feature, latlng) {
          var d = Number(feature.properties.jarak_cbd);
          var color = "red";

          if (d <= 10) color = "green";
          else if (d <= 30) color = "orange";

          return L.circleMarker(latlng, {
            radius: 7,
            fillColor: color,
            color: "#ffffff",
            weight: 1.5,
            fillOpacity: 0.9
          });
        },

        filter: function (feature) {
          var d = Number(feature.properties.jarak_cbd);

          if (kl !== "all" && feature.properties.kl !== kl) {
            return false;
          }

          if (jarak_cbd !== "all" && d > Number(jarak_cbd)) {
            return false;
          }

          total++;
          if (d <= 10) count10++;
          else if (d <= 30) count30++;
          else countAbove++;

          return true;
        },

        onEachFeature: function (feature, layer) {
          var p = feature.properties || {};
          layer.bindPopup(buatPopupHTML(p));
        }
      });

      geojsonLayer.addTo(poiLayer);

      // Simpan bounds seluruh hasil filter aktif
      if (poiLayer.getLayers().length > 0) {
        allBounds = poiLayer.getBounds();
      } else {
        allBounds = null;
      }

      // Zoom otomatis hanya saat pertama kali load
      if (poiLayer.getLayers().length > 0 && firstLoad) {
        map.fitBounds(poiLayer.getBounds(), { padding: [30, 30] });
        firstLoad = false;
      }

      // Update statistik
      document.getElementById("statistik").innerHTML =
        `<b>Total Aset:</b> ${total}`;

      // Update legenda
      var legendHTML = "";

      if (count10 > 0) {
        legendHTML += `
          <div class="legend-item">
            <div class="legend-color" style="background:green"></div>
            ≤ 10 km : ${count10}
          </div>`;
      }

      if (count30 > 0) {
        legendHTML += `
          <div class="legend-item">
            <div class="legend-color" style="background:orange"></div>
            10–30 km : ${count30}
          </div>`;
      }

      if (countAbove > 0) {
        legendHTML += `
          <div class="legend-item">
            <div class="legend-color" style="background:red"></div>
            > 30 km : ${countAbove}
          </div>`;
      }

      if (total === 0) {
        legendHTML = `
          <div class="legend-item" style="color:#6b7280;">
            Tidak ada data yang sesuai dengan filter.
          </div>`;
      }

      document.getElementById("legend-items").innerHTML = legendHTML;
    }

    // =========================
    // 9. EVENT FILTER
    // =========================
    document.getElementById("kl").addEventListener("change", updateMap);
    document.getElementById("jarakcbd_km").addEventListener("change", updateMap);

    // =========================
    // 10. TOMBOL RESET FILTER
    // =========================
    document.getElementById("btn-reset").addEventListener("click", function() {
      document.getElementById("kl").value = "all";
      document.getElementById("jarakcbd_km").value = "all";
      updateMap();

      if (allBounds) {
        map.fitBounds(allBounds, { padding: [30, 30] });
      }
    });

    // =========================
    // 11. TOMBOL ZOOM SEMUA ASET
    // =========================
    document.getElementById("btn-zoom").addEventListener("click", function() {
      if (allBounds) {
        map.fitBounds(allBounds, { padding: [30, 30] });
      }
    });
  </script>
</body>
</html>
